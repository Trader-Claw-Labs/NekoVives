name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # required for cosign keyless signing + SBOM attestation

jobs:
  build-web:
    name: Build Web Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 1

  build-binary:
    name: Build ${{ matrix.name }}
    needs: build-web
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: trader-claw-linux-x86_64
            use_cross: false

          - name: Linux ARM64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: trader-claw-linux-arm64
            use_cross: true

          - name: macOS x86_64
            os: macos-13
            target: x86_64-apple-darwin
            artifact: trader-claw-macos-x86_64
            use_cross: false

          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: trader-claw-macos-arm64
            use_cross: false

          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: trader-claw-windows-x86_64
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Download web dist
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist/

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build binary (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ matrix.artifact }}.tar.gz trader-claw
          mv ${{ matrix.artifact }}.tar.gz ../../../

      - name: Package (Windows ZIP)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path trader-claw.exe -DestinationPath ../../../${{ matrix.artifact }}.zip

      # Build MSI installer for Windows
      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Create minimal placeholder icon if not present
          if (-not (Test-Path wix\trader-claw.ico)) {
            Add-Type -AssemblyName System.Drawing
            $bmp = New-Object System.Drawing.Bitmap(32, 32)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::FromArgb(0, 255, 136))
            $bmp.Save('wix\trader-claw.ico', [System.Drawing.Imaging.ImageFormat]::Icon)
            $g.Dispose(); $bmp.Dispose()
          }
          cargo install cargo-wix --locked
          cargo wix --nocapture --output trader-claw-windows-x86_64.msi

      # Build DMG for macOS
      - name: Build DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dmg_staging
          cp target/${{ matrix.target }}/release/trader-claw dmg_staging/
          cat > dmg_staging/README.txt <<'EOF'
          Trader Claw ${{ github.ref_name }}

          1. Move trader-claw to /usr/local/bin/
          2. Run: trader-claw gateway
          3. Open: http://localhost:42617

          macOS Gatekeeper: if blocked, right-click -> Open -> Open
          EOF
          hdiutil create \
            -volname "Trader Claw ${{ github.ref_name }}" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            ${{ matrix.artifact }}.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.dmg
            trader-claw-windows-x86_64.msi
          if-no-files-found: ignore
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          pattern: trader-claw-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      # Generate SBOM (Software Bill of Materials) — lists every dependency
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: |
          syft dir:. \
            --output spdx-json=artifacts/trader-claw-sbom.spdx.json \
            --output cyclonedx-json=artifacts/trader-claw-sbom.cdx.json

      # Sign binaries with Sigstore/cosign keyless signing (no key management needed)
      # Signatures are stored in the public Rekor transparency log
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        run: |
          for f in artifacts/*.tar.gz artifacts/*.zip artifacts/*.msi artifacts/*.dmg; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes \
              --bundle "${f}.cosign.bundle" \
              "$f"
            echo "Signed: $f"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.msi
            artifacts/*.dmg
            artifacts/checksums.txt
            artifacts/*.spdx.json
            artifacts/*.cdx.json
            artifacts/*.cosign.bundle
